<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>木漏れ日</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="label">木漏れ日</div>

<button id="paramsToggle" type="button" aria-expanded="false" aria-controls="params">調整</button>
<div id="params" aria-label="表示パラメータ" hidden>
  <label>風の強さ <input type="range" id="uWind" min="0" max="100" value="50" autocomplete="off"> <span id="uWindV">50</span></label>
  <label>樹冠の高さ <input type="range" id="uHeight" min="5" max="16" value="16" step="0.5" autocomplete="off"> <span id="uHeightV">16m</span></label>
  <label>葉の密度 <input type="range" id="uCover" min="40" max="90" value="45" autocomplete="off"> <span id="uCoverV">45</span></label>
  <label>太陽高度 <input type="range" id="uElev" min="35" max="80" value="60" autocomplete="off"> <span id="uElevV">60°</span></label>
  <label>見下ろす角度 <input type="range" id="uPitch" min="35" max="90" value="35" autocomplete="off"> <span id="uPitchV">35°</span></label>
</div>

<a id="alt" href="opus/">旧実装 →</a>

<div id="nogl" hidden>このページの表示には WebGL2 対応ブラウザが必要です。</div>

<script src="script.js"></script>
</body>
</html>
